<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Autobidder Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 420px;
      padding: 14px;
      background: #f7f7f7;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input, textarea, select, button {
			width: 100%;
			box-sizing: border-box;
			margin-top: 5px;
			padding: 8px;
			font-size: 13px;
		}

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 10px;
    }

    button:hover {
      background: #374151;
    }

    .secondary {
      background: #2563eb;
    }

    .success {
      color: green;
      font-size: 13px;
      margin-top: 8px;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 8px;
    }

    .small {
      font-size: 12px;
      color: #555;
      word-break: break-all;
    }

    .result-box {
      margin-top: 14px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
    }

    .result-title {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin: 4px 0;
    }

    .output-text {
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.4;
      max-height: 180px;
      overflow-y: auto;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 8px;
      border-radius: 6px;
    }

    .copy-btn {
      background: #059669;
      margin-top: 6px;
      padding: 7px;
      font-size: 12px;
    }

    .hidden {
      display: none;
    }

		.candidate-preview {
			margin-top: 8px;
			padding: 8px;
			background: #eef2ff;
			border: 1px solid #c7d2fe;
			border-radius: 6px;
			font-size: 12px;
			color: #1f2937;
			line-height: 1.4;
		}
  </style>
</head>
<body>
  <h2>Autobidder Assistant</h2>

  <label>Search Candidate</label>
    <input id="candidateSearch" type="text" placeholder="Search by name, email, or location" />

    <label>Select Candidate</label>
    <select id="candidateSelect">
    <option value="">Loading candidates...</option>
    </select>

<div id="candidatePreview" class="candidate-preview hidden"></div>

  <label>Company Name</label>
  <input id="companyName" type="text" placeholder="Example: HCA Healthcare" />

  <label>Job Title</label>
  <input id="jobTitle" type="text" placeholder="Example: Senior Data Engineer" />

  <label>Screening Questions</label>
  <textarea id="screeningQuestions" placeholder="Enter one question per line"></textarea>

  <label>Current Job URL</label>
  <div id="currentUrl" class="small">Loading...</div>

  <button id="captureBtn">Generate Application Draft</button>
  <button id="autofillBtn" class="secondary">Autofill Basic Fields</button>

  <div id="status"></div>

  <div id="resultBox" class="result-box hidden">
    <div class="result-title">Application Draft Result</div>

    <div class="metric-row">
      <span>Application ID:</span>
      <strong id="applicationId">-</strong>
    </div>

    <div class="metric-row">
      <span>Match Score:</span>
      <strong id="matchScore">-</strong>
    </div>

    <div class="metric-row">
      <span>Duplicate:</span>
      <strong id="duplicateStatus">-</strong>
    </div>

    <div class="metric-row">
      <span>Status:</span>
      <strong id="applicationStatus">-</strong>
    </div>

    <label>Cover Letter</label>
    <div id="coverLetterOutput" class="output-text"></div>
    <button id="copyCoverLetterBtn" class="copy-btn">Copy Cover Letter</button>

    <label>Screening Answers</label>
    <div id="screeningAnswersOutput" class="output-text"></div>
    <button id="copyScreeningAnswersBtn" class="copy-btn">Copy Screening Answers</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
