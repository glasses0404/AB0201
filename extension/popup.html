<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Autobidder Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 360px;
      padding: 14px;
      background: #f7f7f7;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 5px;
      padding: 8px;
      font-size: 13px;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #374151;
    }

    .secondary {
      background: #2563eb;
    }

    .success {
      color: green;
      font-size: 13px;
      margin-top: 8px;
    }

    .error {
      color: red;
      font-size: 13px;
      margin-top: 8px;
    }

    .small {
      font-size: 12px;
      color: #555;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h2>Autobidder Assistant</h2>

  <label>Candidate ID</label>
  <input id="candidateId" type="number" placeholder="Example: 1" />

  <label>Company Name</label>
  <input id="companyName" type="text" placeholder="Example: HCA Healthcare" />

  <label>Job Title</label>
  <input id="jobTitle" type="text" placeholder="Example: Senior Data Engineer" />

  <label>Screening Questions</label>
  <textarea id="screeningQuestions" placeholder="Enter one question per line"></textarea>

  <label>Current Job URL</label>
  <div id="currentUrl" class="small">Loading...</div>

  <button id="captureBtn">Generate Application Draft</button>
  <button id="autofillBtn" class="secondary">Autofill Basic Fields</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
