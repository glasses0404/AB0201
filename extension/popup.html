<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Autobidder Assistant</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 420px;
        padding: 14px;
        background: #f7f7f7;
      }

      h2 {
        margin-top: 0;
        font-size: 18px;
      }

      label {
        font-size: 13px;
        font-weight: bold;
        margin-top: 10px;
        display: block;
      }

      input,
      textarea,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        margin-top: 5px;
        padding: 8px;
        font-size: 13px;
      }

      textarea {
        min-height: 70px;
        resize: vertical;
      }

      button {
        margin-top: 12px;
        background: #111827;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        padding: 10px;
      }

      button:hover {
        background: #374151;
      }

      .secondary {
        background: #2563eb;
      }

      .success {
        color: green;
        font-size: 13px;
        margin-top: 8px;
      }

      .error {
        color: red;
        font-size: 13px;
        margin-top: 8px;
      }

      .small {
        font-size: 12px;
        color: #555;
        word-break: break-all;
      }

      .result-box {
        margin-top: 14px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
      }

      .result-title {
        font-weight: bold;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .metric-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin: 4px 0;
      }

      .output-text {
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.4;
        max-height: 180px;
        overflow-y: auto;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        padding: 8px;
        border-radius: 6px;
      }

      .copy-btn {
        background: #059669;
        margin-top: 6px;
        padding: 7px;
        font-size: 12px;
      }

      .hidden {
        display: none;
      }

      .candidate-preview {
        margin-top: 8px;
        padding: 8px;
        background: #eef2ff;
        border: 1px solid #c7d2fe;
        border-radius: 6px;
        font-size: 12px;
        color: #1f2937;
        line-height: 1.4;
      }

      .create-candidate-box {
        margin-top: 14px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 10px;
      }

      .create-candidate-box textarea {
        min-height: 140px;
      }

      .create-candidate-box input,
      .create-candidate-box select,
      .create-candidate-box textarea {
        background: #ffffff;
      }

      .duplicate-warning {
        margin-top: 8px;
        padding: 9px;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.4;
      }

      .duplicate-warning.exact {
        background: #fee2e2;
        border: 1px solid #ef4444;
        color: #7f1d1d;
      }

      .duplicate-warning.possible {
        background: #fef3c7;
        border: 1px solid #f59e0b;
        color: #78350f;
      }

      .duplicate-warning.unique {
        background: #dcfce7;
        border: 1px solid #22c55e;
        color: #14532d;
      }
      .low-match-warning {
        margin-top: 8px;
        padding: 9px;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.4;
      }

      .low-match-warning.block {
        background: #fee2e2;
        border: 1px solid #ef4444;
        color: #7f1d1d;
      }

      .low-match-warning.review {
        background: #fef3c7;
        border: 1px solid #f59e0b;
        color: #78350f;
      }

      .low-match-warning.good {
        background: #dcfce7;
        border: 1px solid #22c55e;
        color: #14532d;
      }

      .manager-override-box {
        margin-top: 10px;
        background: #fff7ed;
        border: 1px solid #fb923c;
        border-radius: 8px;
        padding: 10px;
      }

      .application-card {
        margin-top: 10px;
        padding: 9px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .application-card-title {
        font-weight: bold;
        font-size: 13px;
        margin-bottom: 4px;
      }

      .application-card-meta {
        color: #4b5563;
        margin-bottom: 6px;
      }

      .application-card-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .application-card-actions button {
        margin-top: 0;
        font-size: 11px;
        padding: 6px;
      }

      .application-status-pill {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 999px;
        background: #e5e7eb;
        color: #111827;
        font-size: 11px;
        margin-top: 3px;
      }

      .application-warning-pill {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 999px;
        background: #fee2e2;
        color: #7f1d1d;
        font-size: 11px;
        margin-top: 3px;
      }
    </style>
  </head>
  <body>
    <h2>Autobidder Assistant</h2>
    <label>Bidder Name</label>
    <select id="bidderName">
      <option value="">Select bidder</option>
      <option value="David">David</option>
      <option value="Maria">Maria</option>
      <option value="Faraz">Faraz</option>
      <option value="Jeremy">Jeremy</option>
      <option value="Alicia">Alicia</option>
      <option value="Other">Other</option>
    </select>

    <input
      id="customBidderName"
      class="hidden"
      type="text"
      placeholder="Enter bidder name"
    />

    <label>Search Candidate</label>
    <input
      id="candidateSearch"
      type="text"
      placeholder="Search by name, email, or location"
    />

    <label>Select Candidate</label>
    <select id="candidateSelect">
      <option value="">Loading candidates...</option>
    </select>

    <div id="candidatePreview" class="candidate-preview hidden"></div>

    <button id="toggleCreateCandidateBtn" class="secondary">
      Show Create Candidate
    </button>

    <div id="createCandidateBox" class="create-candidate-box hidden">
      <div class="result-title">Create New Candidate</div>

      <label>First Name *</label>
      <input id="newFirstName" type="text" placeholder="Example: Michael" />

      <label>Last Name *</label>
      <input id="newLastName" type="text" placeholder="Example: Johnson" />

      <label>Email</label>
      <input id="newEmail" type="email" placeholder="michael@example.com" />

      <label>Phone</label>
      <input id="newPhone" type="text" placeholder="555-555-5555" />

      <label>Location</label>
      <input id="newLocation" type="text" placeholder="Dallas, TX" />

      <label>LinkedIn</label>
      <input
        id="newLinkedin"
        type="text"
        placeholder="https://linkedin.com/in/..."
      />

      <label>GitHub</label>
      <input id="newGithub" type="text" placeholder="https://github.com/..." />

      <label>Portfolio</label>
      <input
        id="newPortfolio"
        type="text"
        placeholder="https://portfolio.com"
      />

      <label>Work Authorization</label>
      <input
        id="newWorkAuthorization"
        type="text"
        placeholder="US Citizen / Green Card / H1B / etc."
      />

      <label>Sponsorship Required</label>
      <select id="newSponsorshipRequired">
        <option value="">Select</option>
        <option value="No">No</option>
        <option value="Yes">Yes</option>
        <option value="Manual Review Required">Manual Review Required</option>
      </select>

      <label>Expected Salary</label>
      <input
        id="newExpectedSalary"
        type="text"
        placeholder="$130,000 - $150,000"
      />

      <label>Resume Text *</label>
      <textarea
        id="newResumeText"
        placeholder="Paste resume text here"
      ></textarea>

      <button id="createCandidateBtn">Create Candidate</button>
    </div>

    <div id="candidatePreview" class="candidate-preview hidden"></div>

    <label>Company Name</label>
    <input id="companyName" type="text" placeholder="Example: HCA Healthcare" />

    <label>Job Title</label>
    <input
      id="jobTitle"
      type="text"
      placeholder="Example: Senior Data Engineer"
    />

    <button id="detectJobInfoBtn" class="secondary">
      Auto-Detect Job Info
    </button>

    <button id="aiDetectJobInfoBtn" class="secondary">
      AI Detect Job Info
    </button>

    <div id="jobInfoPreview" class="candidate-preview hidden"></div>

    <label>Screening Questions</label>
    <textarea
      id="screeningQuestions"
      placeholder="Enter one question per line"
    ></textarea>

    <label>Current Job URL</label>
    <div id="currentUrl" class="small">Loading...</div>

    <button id="captureBtn">Generate Application Draft</button>
    <button id="autofillBtn" class="secondary">Autofill Basic Fields</button>
    <button id="dailyReportBtn" class="secondary">Show Today Report</button>
    <button id="exportDailyCsvBtn" class="secondary">Export Today CSV</button>
    <button id="syncGoogleSheetsBtn" class="secondary">
      Sync to Google Sheets
    </button>
    <button id="syncLogsBtn" class="secondary">Show Sync Logs</button>

    <div id="syncLogsBox" class="result-box hidden">
      <div class="result-title">Google Sheets Sync Logs</div>
      <div id="syncLogsOutput" class="output-text"></div>
    </div>

    <div id="dailyReportBox" class="result-box hidden">
      <div class="result-title">Today Report</div>
      <div id="dailyReportOutput" class="output-text"></div>
    </div>

    <button id="recentApplicationsBtn" class="secondary">
      Show Recent Applications
    </button>

    <div id="recentApplicationsBox" class="result-box hidden">
      <div class="result-title">Recent Applications</div>

      <label>Filter Status</label>
      <select id="recentStatusFilter">
        <option value="">All Statuses</option>
        <option value="Draft Generated">Draft Generated</option>
        <option value="Needs Review">Needs Review</option>
        <option value="Approved">Approved</option>
        <option value="Submitted">Submitted</option>
        <option value="Duplicate">Duplicate</option>
        <option value="Skipped - Low Match">Skipped - Low Match</option>
        <option value="Failed">Failed</option>
      </select>

      <label>Filter Bidder</label>
      <input id="recentBidderFilter" type="text" placeholder="Example: David" />

      <label>Filter Candidate ID</label>
      <input
        id="recentCandidateFilter"
        type="number"
        placeholder="Example: 1"
      />

      <button id="applyRecentFiltersBtn" class="secondary">
        Apply Filters
      </button>
      <button id="exportFilteredCsvBtn" class="secondary">
        Export Filtered CSV
      </button>

      <div id="recentApplicationsOutput"></div>
    </div>

    <div id="status"></div>

    <div id="resultBox" class="result-box hidden">
      <div class="result-title">Application Draft Result</div>

      <div class="metric-row">
        <span>Application ID:</span>
        <strong id="applicationId">-</strong>
      </div>

      <div class="metric-row">
        <span>Match Score:</span>
        <strong id="matchScore">-</strong>
      </div>
      <div id="lowMatchWarningBox" class="low-match-warning hidden"></div>

      <div class="metric-row">
        <span>Duplicate:</span>
        <strong id="duplicateStatus">-</strong>
      </div>
      <div id="duplicateWarningBox" class="duplicate-warning hidden"></div>

      <div class="metric-row">
        <span>Status:</span>
        <strong id="applicationStatus">-</strong>
      </div>

      <div class="metric-row">
        <span>Submitted At:</span>
        <strong id="submittedAt">-</strong>
      </div>

      <div class="metric-row">
        <span>Manager Override:</span>
        <strong id="managerOverrideUsed">-</strong>
      </div>

      <label>Update Status</label>
      <select id="statusSelect">
        <option value="Draft Generated">Draft Generated</option>
        <option value="Needs Review">Needs Review</option>
        <option value="Approved">Approved</option>
        <option value="Submitted">Submitted</option>
        <option value="Duplicate">Duplicate</option>
        <option value="Skipped - Low Match">Skipped - Low Match</option>
        <option value="Failed">Failed</option>
      </select>

      <button id="updateStatusBtn" class="secondary">
        Update Application Status
      </button>

      <div id="managerOverrideBox" class="manager-override-box hidden">
        <div class="result-title">Manager Override</div>

        <label>Override Code</label>
        <input
          id="overrideCode"
          type="password"
          placeholder="Manager override code"
        />

        <label>Override By</label>
        <input id="overrideBy" type="text" placeholder="Manager name" />

        <label>Override Reason</label>
        <textarea
          id="overrideReason"
          placeholder="Explain why this blocked application should be submitted"
        ></textarea>
      </div>

      <label>Cover Letter</label>
      <div id="coverLetterOutput" class="output-text"></div>
      <button id="copyCoverLetterBtn" class="copy-btn">
        Copy Cover Letter
      </button>

      <label>Screening Answers</label>
      <div id="screeningAnswersOutput" class="output-text"></div>
      <button id="copyScreeningAnswersBtn" class="copy-btn">
        Copy Screening Answers
      </button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
